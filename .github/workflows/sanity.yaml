name: Sanity Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Sanity Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: 'docs/*runbooks/*.md'
