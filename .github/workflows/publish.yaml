name: Generate a build and push to 'ghpages' branch

on:
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push
    steps:
      - name: git-checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: 3.8

      - name: Run Python commands
        working-directory: ./tools/ghpages
        run: |
          pip install --upgrade pip
          python3.8 -m venv venv
          source venv/bin/activate
          echo "VIRTUAL ENV:" $VIRTUAL_ENV

      - name: Build
        run: tools/ghpages/venv/bin/python tools/ghpages/main.py --config_file docs/ghpages.json --output_dir dist/

      - name: Push
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(git log -1 --format='%s')
          cd dist/
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Build: (${SHORT_SHA}) ${COMMIT_MSG}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:ghpages
